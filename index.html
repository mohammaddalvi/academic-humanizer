<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Prose Humanizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1623;
    --navy-mid: #1a2436;
    --navy-light: #243048;
    --gold: #c9a84c;
    --gold-dim: #a8883a;
    --white: #f0eeea;
    --muted: #8a96aa;
    --border: #2c3a52;
    --error: #c0544a;
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  header h1 span {
    color: var(--gold);
  }

  header p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 820px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .panel label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .panel label span {
    color: var(--gold);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.78rem;
    float: right;
  }

  textarea {
    width: 100%;
    height: 320px;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--gold-dim);
  }

  textarea::placeholder {
    color: var(--muted);
  }

  textarea[readonly] {
    cursor: default;
    color: #d8d4cc;
  }

  .word-count {
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: right;
  }

  .word-count.over {
    color: var(--error);
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  button {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 12px 28px;
    transition: all 0.2s;
  }

  #transformBtn {
    background: var(--gold);
    color: var(--navy);
    min-width: 180px;
  }

  #transformBtn:hover:not(:disabled) {
    background: #d4b05a;
  }

  #transformBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #copyBtn {
    background: var(--navy-light);
    color: var(--white);
    border: 1px solid var(--border);
    display: none;
  }

  #copyBtn:hover {
    background: var(--border);
  }

  .status {
    text-align: center;
    margin-top: 16px;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 20px;
  }

  .status.error {
    color: var(--error);
  }

  .loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.78rem;
    text-align: center;
    opacity: 0.6;
  }

  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Academic Prose <span>Humanizer</span></h1>
  <p>Paste AI-generated academic text. It will be rewritten in a natural, peer-reviewed journal register — dense, evidence-grounded, and citation-ready.</p>
</header>

<div class="card">
  <div class="panels">
    <div class="panel">
      <label>Input Text <span id="wc">0 / 500 words</span></label>
      <textarea id="inputText" placeholder="Paste your text here (maximum 500 words)..."></textarea>
      <div class="word-count" id="wcBar"></div>
    </div>
    <div class="panel">
      <label>Humanized Output</label>
      <textarea id="outputText" readonly placeholder="Your rewritten text will appear here..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button id="transformBtn" onclick="transform()">Rewrite Text</button>
    <button id="copyBtn" onclick="copyOutput()">Copy Output</button>
  </div>

  <div class="status" id="status"></div>
</div>

<footer>Powered by Claude &mdash; Academic register based on published IS research</footer>

<script>
  const inputEl = document.getElementById('inputText');
  const outputEl = document.getElementById('outputText');
  const wcEl = document.getElementById('wc');
  const statusEl = document.getElementById('status');
  const transformBtn = document.getElementById('transformBtn');
  const copyBtn = document.getElementById('copyBtn');

  inputEl.addEventListener('input', () => {
    const words = countWords(inputEl.value);
    wcEl.textContent = words + ' / 500 words';
    wcEl.className = words > 500 ? 'over' : '';
  });

  function countWords(text) {
    return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  }

  async function transform() {
    const input = inputEl.value.trim();
    if (!input) {
      setStatus('Please paste some text first.', true);
      return;
    }
    const words = countWords(input);
    if (words > 500) {
      setStatus('Please reduce your text to 500 words or fewer.', true);
      return;
    }

    transformBtn.disabled = true;
    copyBtn.style.display = 'none';
    outputEl.value = '';
    setStatus('<span class="loader"></span>Rewriting...', false, true);

    try {
      const response = await fetch('/api/transform', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input })
      });

      const data = await response.json();

      if (data.error) {
        setStatus('Error: ' + data.error, true);
        return;
      }

      outputEl.value = data.result;
      setStatus('Done. Review and refine as needed.');
      copyBtn.style.display = 'inline-block';

    } catch (err) {
      setStatus('Something went wrong. Please try again.', true);
      console.error(err);
    } finally {
      transformBtn.disabled = false;
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText(outputEl.value).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy Output'; }, 2000);
    });
  }

  function setStatus(msg, isError, isHtml) {
    statusEl.className = 'status' + (isError ? ' error' : '');
    if (isHtml) statusEl.innerHTML = msg;
    else statusEl.textContent = msg;
  }
</script>
</body>
</html>
